site_name: "Antigravity CLI Field Workshop"
site_description: "Hands-on field workshop for Antigravity CLI — from daily SDLC productivity to building production AGY agents with the SDK"
site_url: "https://carlosmscabral.github.io/agy-cli-field-workshop"
repo_url: "https://github.com/carlosmscabral/agy-cli-field-workshop"
repo_name: "carlosmscabral/agy-cli-field-workshop"

theme:
  name: material
  icon:
    repo: fontawesome/brands/github
  palette:
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: deep purple
      accent: cyan
      toggle:
        icon: material/brightness-7
        name: Switch to light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: deep purple
      accent: cyan
      toggle:
        icon: material/brightness-4
        name: Switch to dark mode
  features:
    - content.code.copy
    - content.code.annotate
    - content.tabs.link
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.footer
    - search.highlight
    - search.suggest
    - toc.follow
  font:
    text: Inter
    code: JetBrains Mono

nav:
  - Home: index.md
  - "📦 Pre-Work":
      - Introduction & Tracks: setup.md
      - Track A - Cloud Shell Setup: setup-cloud-shell.md
      - Track B - Corporate Dev Setup:
          - IT Admin Provisioning (Admin): setup-enterprise-admin.md
          - Workstation Setup (Dev): setup-corporate.md
  - "🛠️ Workshop":
      - "1. SDLC Productivity": sdlc-productivity.md
      - "2. Legacy Modernization ⭐": legacy-modernization.md
      - "3. Building AGY Agents": agy-sdk.md
      - "4. Multi-Agent & Advanced": multi-agent-advanced.md
      - "5. ADK Agents with agents-cli": agents-cli.md
  - "🧪 Exercises":
      - "1. First Session (ex01)": exercises/ex01_first_session.md
      - "2. Custom Skills (ex02)": exercises/ex02_custom_skills.md
      - "3. .NET Modernization (ex03)": exercises/ex03_dotnet_modernization.md
      - "4. Java Upgrade (ex04)": exercises/ex04_java_upgrade.md
      - "5. Your First Agent (ex05)": exercises/ex05_first_agent.md
      - "6. Multi-Agent Pipeline (ex06)": exercises/ex06_multi_agent_pipeline.md
      - "7. Subagents (ex07)": exercises/ex07_subagents.md
      - "8. /btw & Scheduling (ex08)": exercises/ex08_btw_scheduling.md
      - "9. Sandbox Governance (ex09)": exercises/ex09_sandbox_governance.md
      - "10. ADK Agent Lifecycle (ex10)": exercises/ex10_agents_cli_lifecycle.md
      - "Appendix: First Sidecar (ex11)": exercises/ex11_first_sidecar.md
      - "Appendix: --print Pipeline (ex12)": exercises/ex12_print_mode_pipeline.md
      - "Appendix: Migration Walkthrough (ex13)": exercises/ex13_migration_walkthrough.md
      - "Appendix: Dataplex Metadata Curation (ex14)": exercises/ex14_dataplex_metadata_steward.md
  - "📋 Resources":
      - Cheatsheet: cheatsheet.md
      - Facilitator Guide: facilitator-guide.md
      - "Reference: Plugin Ecosystem": plugin-ecosystem.md
      - "Reference: DevOps Patterns": devops-automation.md

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.mark
  - pymdownx.critic
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true

plugins:
  - search
  - i18n:
      docs_structure: folder
      languages:
        - locale: en
          name: English
          default: true
          build: true
        - locale: ko
          name: 한국어
          build: true
        - locale: id
          name: Bahasa Indonesia
          build: true
        - locale: zh
          name: 简体中文
          build: true
  - minify:
      minify_html: true

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/carlosmscabral/agy-cli-field-workshop
  generator: false

extra_css:
  - assets/custom.css
