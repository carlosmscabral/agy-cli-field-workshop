site_name: "Antigravity CLI Field Workshop"
site_description: "Hands-on field workshop for Antigravity CLI — from daily SDLC productivity to building production AGY agents with the SDK"
site_url: "https://carlosmscabral.github.io/agy-cli-field-workshop"
repo_url: "https://github.com/carlosmscabral/agy-cli-field-workshop"
repo_name: "carlosmscabral/agy-cli-field-workshop"

theme:
  name: material
  icon:
    repo: fontawesome/brands/github
  palette:
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: deep purple
      accent: cyan
      toggle:
        icon: material/brightness-7
        name: Switch to light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: deep purple
      accent: cyan
      toggle:
        icon: material/brightness-4
        name: Switch to dark mode
  features:
    - content.code.copy
    - content.code.annotate
    - content.tabs.link
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.footer
    - search.highlight
    - search.suggest
    - toc.follow
  font:
    text: Inter
    code: JetBrains Mono

nav:
  - Home: index.md
  - "📦 Pre-Work":
      - Environment Setup: setup.md
      - Enterprise Admin Guide: setup-enterprise-admin.md
  - "🛠️ Workshop":
      - "1. SDLC Productivity": sdlc-productivity.md
      - "2. Legacy Modernization ⭐": legacy-modernization.md
      - "3. Building AGY Agents": agy-sdk.md
      - "4. Multi-Agent & Advanced": multi-agent-advanced.md
      - "5. ADK Agents with agents-cli": agents-cli.md
  - "🧪 Exercises":
      - "First Session (ex01)": exercises/ex01_first_session.md
      - "Custom Skills (ex02)": exercises/ex02_custom_skills.md
      - "First Sidecar (ex02b)": exercises/ex02b_first_sidecar.md
      - "--print Pipeline (ex03)": exercises/ex03_print_mode_pipeline.md
      - "Subagents (ex04)": exercises/ex04_subagents.md
      - "/btw & Scheduling (ex05)": exercises/ex05_btw_scheduling.md
      - "Sandbox Governance (ex06)": exercises/ex06_sandbox_governance.md
      - "Migration Walkthrough (ex07)": exercises/ex07_migration_walkthrough.md
      - ".NET Modernization (ex08)": exercises/ex08_dotnet_modernization.md
      - "Java Upgrade (ex09)": exercises/ex09_java_upgrade.md
      - "First Agent (ex10)": exercises/ex10_first_agent.md
      - "Multi-Agent Pipeline (ex11)": exercises/ex11_multi_agent_pipeline.md
      - "ADK Agent Lifecycle (ex12)": exercises/ex12_agents_cli_lifecycle.md
  - "📋 Resources":
      - Cheatsheet: cheatsheet.md
      - Facilitator Guide: facilitator-guide.md
      - "Reference: Plugin Ecosystem": plugin-ecosystem.md
      - "Reference: DevOps Patterns": devops-automation.md

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.mark
  - pymdownx.critic
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true

plugins:
  - search
  - i18n:
      docs_structure: folder
      languages:
        - locale: en
          name: English
          default: true
          build: true
        - locale: ko
          name: 한국어
          build: true
        - locale: id
          name: Bahasa Indonesia
          build: true
        - locale: zh
          name: 简体中文
          build: true
  - minify:
      minify_html: true

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/carlosmscabral/agy-cli-field-workshop
  generator: false

extra_css:
  - assets/custom.css
