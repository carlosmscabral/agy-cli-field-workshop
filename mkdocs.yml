site_name: "Antigravity CLI Field Workshop"
site_description: "Hands-on field workshop for Antigravity CLI — one end-to-end software story (discovery → planning → coding → fixes → security) over a real FastAPI project"
site_url: "https://carlosmscabral.github.io/agy-cli-field-workshop"
repo_url: "https://github.com/carlosmscabral/agy-cli-field-workshop"
repo_name: "carlosmscabral/agy-cli-field-workshop"

theme:
  name: material
  icon:
    repo: fontawesome/brands/github
  palette:
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: deep purple
      accent: cyan
      toggle:
        icon: material/brightness-7
        name: Switch to light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: deep purple
      accent: cyan
      toggle:
        icon: material/brightness-4
        name: Switch to dark mode
  features:
    - content.code.copy
    - content.code.annotate
    - content.tabs.link
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.footer
    - search.highlight
    - search.suggest
    - toc.follow
  font:
    text: Inter
    code: JetBrains Mono

nav:
  - Home: index.md
  - "📦 Pre-Work":
      - Setup & Prerequisites: setup.md
      - IT Admin Provisioning: setup-enterprise-admin.md
      - Workstation Setup: setup-corporate.md
  - "🛠️ The Workshop":
      - "Overview — An End-to-End Software Story": overview.md
      - "1. First Session (Discovery)": exercises/ex01_first_session.md
      - "2. Artifacts — Plan, Review & Build": exercises/ex02_artifacts.md
      - "3. Skills & Rules (Coding Standards)": exercises/ex03_skills_rules.md
      - "4. Governed Access with MCP": exercises/ex04_mcp_governed_access.md
      - "5. Subagents (Fixes & Refactor)": exercises/ex05_subagents.md
  - "📋 Resources":
      - Cheatsheet: cheatsheet.md
      - Facilitator Guide: facilitator-guide.md
      - "Reference: Workspace Customization": plugin-ecosystem.md

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.mark
  - pymdownx.critic
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true

plugins:
  - search
  - minify:
      minify_html: true

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/carlosmscabral/agy-cli-field-workshop
  generator: false

extra_css:
  - assets/custom.css
