name: 'Content Improvement'
description: 'Suggest improvements to workshop content, new exercises, or additional use cases'
labels:
  - 'type/improvement'
  - 'status/triage'
body:
  - type: 'markdown'
    attributes:
      value: |-
        > [!IMPORTANT]
        > Thanks for suggesting an improvement!
        >
        > Please search **[existing issues](https://github.com/carlosmscabral/agy-cli-field-workshop/issues)** to see if a similar suggestion exists.

  - type: 'textarea'
    id: 'improvement'
    attributes:
      label: 'What would you like improved or added?'
      description: 'A clear description of the content improvement.'
    validations:
      required: true

  - type: 'textarea'
    id: 'rationale'
    attributes:
      label: 'Why is this needed?'
      description: 'How would this improve the workshop experience?'
    validations:
      required: true

  - type: 'dropdown'
    id: 'module'
    attributes:
      label: 'Which workshop module does this relate to?'
      options:
        - '⚙️ Environment Setup'
        - '1. SDLC Productivity'
        - '2. Plugin Ecosystem'
        - '3. DevOps Automation'
        - '4. Multi-Agent & Advanced Patterns'
        - '⚠️ M09 — Migration Guide'
        - '📋 Facilitator Guide'
        - '📄 Cheatsheet'
        - '🌐 Translations (i18n)'
        - 'New module / use case'
        - 'Other'
    validations:
      required: true

  - type: 'textarea'
    id: 'additional-context'
    attributes:
      label: 'Additional context'
      description: 'Add any examples, references, or mockups here.'
